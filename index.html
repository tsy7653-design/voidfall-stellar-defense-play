<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color" content="#050713">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="虚空防线">
  <title>星辰寂灭：虚空防线</title>
  <style>
    :root {
      --mobile-safari-top-reserve: 0px;
      --mobile-safari-bottom-reserve: 0px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #050713;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game-container {
      position: fixed;
      inset:
        calc(env(safe-area-inset-top) + var(--mobile-safari-top-reserve))
        env(safe-area-inset-right)
        calc(env(safe-area-inset-bottom) + var(--mobile-safari-bottom-reserve))
        env(safe-area-inset-left);
      display: flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: auto;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      touch-action: none;
    }

    #game-container canvas {
      display: block;
      touch-action: none;
    }

    #orientation-notice {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      box-sizing: border-box;
      background: rgba(3, 7, 18, 0.96);
      color: #e5f2ff;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.7;
      pointer-events: auto;
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #orientation-notice {
        display: flex;
      }
    }

    /* Safari 普通页面模式的地址栏不计入硬件安全区，额外预留画布顶部空间。 */
    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      :root {
        --mobile-safari-top-reserve: clamp(44px, 11svh, 64px);
        --mobile-safari-bottom-reserve: 6px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="orientation-notice" role="status" aria-live="polite">
    请横屏游玩<br>
    <span style="font-size: 14px; font-weight: 400; color: #9fb3c8">横屏后将自动继续游戏</span>
  </div>

  <script>
    // 仅抑制浏览器手势，Phaser 仍通过 Pointer Events 接收游戏触控。
    document.addEventListener("contextmenu", (event) => event.preventDefault());
    document.addEventListener("dblclick", (event) => event.preventDefault());
    ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => event.preventDefault());
    });
    document.addEventListener("touchmove", (event) => {
      if (event.target.closest("#game-container")) event.preventDefault();
    }, { passive: false });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <script src="./main.js?v=0.8.2"></script>
</body>
</html>
